<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'none';
        script-src {{cspSource}} 'unsafe-inline' 'unsafe-eval' blob: https://unpkg.com;
        worker-src {{cspSource}} blob:;
        style-src {{cspSource}} 'unsafe-inline';
        font-src {{cspSource}} data:;
        img-src {{cspSource}} https: data: blob:;
        connect-src {{cspSource}} blob: https:;
    ">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{katexCssUri}}">
    <link rel="stylesheet" href="{{styleUri}}">
    <link rel="stylesheet" href="{{tikzJaxCssUri}}">
    <title>SnapTeX Preview</title>
</head>
<body
    data-tikz-jax-js-uri="{{tikzJaxJsUri}}"
    data-pdf-js-uri="{{pdfJsUri}}"
    data-pdf-worker-uri="{{pdfWorkerUri}}"
>
<div id="content-root"></div>
<script src="{{webviewMainUri}}"></script>
<script src="{{webviewPdfUri}}"></script>
</body>
</html>
